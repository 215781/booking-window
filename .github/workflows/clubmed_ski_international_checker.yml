name: Club Med International Ski Price Checker

on:
  schedule:
    - cron: "0 9 * * *"    # 09:00 UTC daily — 90 min after summer checker (07:30 UTC)
  workflow_dispatch:        # manual trigger available from GitHub Actions tab

permissions:
  contents: write

jobs:
  check-ski-international-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # international ski: 8 resorts × ~22 dates × 3 party sizes ≈ ~528 queries; ~15 min expected

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp

      - name: Run international ski price checker
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}
        run: python clubmed_ski_international_checker.py

      - name: Commit updated CSV (safety net)
        # Per-resort commits happen inside the checker; this catches anything that slipped through.
        if: always()
        run: |
          git config user.name  "Booking Window Bot"
          git config user.email "bot@bookingwindow.co.uk"
          git pull --rebase origin main || true
          git add _data/prices_clubmed_ski_international.csv
          git diff --staged --quiet || git commit -m "data: international ski prices $(date +%Y-%m-%d) [safety net]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || true
