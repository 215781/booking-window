name: Mark Warner Price Checker

on:
  schedule:
    - cron: "0 7 * * *"    # 07:00 UTC daily (offset from Club Med at 06:00)
  workflow_dispatch:        # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Mark Warner price checker
        run: python markwarner_checker.py

      - name: Commit updated CSV
        run: |
          git config user.name  "Booking Window Bot"
          git config user.email "bot@bookingwindow.co.uk"
          git add _data/markwarner_prices.csv
          git diff --staged --quiet || git commit -m "Mark Warner price update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
