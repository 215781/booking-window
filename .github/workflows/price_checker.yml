name: Club Med Price Checker

on:
  # Scheduled runs paused — 882 queries per run risks IP ban from Club Med.
  # Need to implement request spreading or rotating IPs before re-enabling.
  # To re-enable: uncomment the schedule block below.
  # schedule:
  #   - cron: "0 7 * * *"   # 07:00 UTC (08:00 UK) — morning run
  #   - cron: "0 19 * * *"  # 19:00 UTC (20:00 UK) — evening run
  workflow_dispatch:        # manual trigger still available from GitHub Actions tab

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run price checker
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}
        run: python clubmed_checker.py

      - name: Commit updated files
        run: |
          git config user.name  "Booking Window Bot"
          git config user.email "bot@bookingwindow.co.uk"
          git add BookingWindow.html price_history.csv
          git diff --staged --quiet || git commit -m "Price update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
