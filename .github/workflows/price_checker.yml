name: Club Med Price Checker

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC daily — async run (~15-20min)
  workflow_dispatch:        # manual trigger still available from GitHub Actions tab

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # async rewrite completes in <30min; 60 gives double margin

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp

      - name: Run price checker
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}
        run: python clubmed_checker.py

      - name: Data quality check
        continue-on-error: true
        run: python3 data_quality_check.py

      - name: Commit updated CSV (safety net)
        # Per-resort commits happen inside the checker; this catches anything that slipped through.
        # HTML generation is handled by build_site.yml, not this workflow.
        run: |
          git config user.name  "Booking Window Bot"
          git config user.email "bot@bookingwindow.co.uk"
          git add _data/prices_clubmed.csv
          git diff --staged --quiet || git commit -m "Price update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
