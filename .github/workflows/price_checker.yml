name: Club Med Price Checker

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
    - cron: "0 18 * * *"  # 18:00 UTC daily
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run price checker
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}
        run: python clubmed_checker.py

      - name: Commit updated files
        run: |
          git config user.name  "Booking Window Bot"
          git config user.email "bot@bookingwindow.co.uk"
          git add BookingWindow.html price_history.csv
          git diff --staged --quiet || git commit -m "Price update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
