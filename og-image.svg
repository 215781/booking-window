<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a4a42"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2e28"/>
      <stop offset="100%" stop-color="#2a6858"/>
    </linearGradient>
  </defs>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Wordmark -->
  <text x="80" y="260" font-family="Georgia,serif" font-size="88" font-weight="400" fill="#f5f0e8" letter-spacing="-2">When To Book</text>
  <!-- Strapline -->
  <text x="82" y="330" font-family="Arial,sans-serif" font-size="28" font-weight="300" fill="rgba(245,240,232,0.65)" letter-spacing="1">Club Med ski resort price intelligence</text>
  <!-- URL -->
  <text x="82" y="520" font-family="Arial,sans-serif" font-size="22" fill="rgba(245,240,232,0.45)" letter-spacing="0.5">whentobook.co.uk</text>
</svg>
