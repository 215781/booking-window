<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>When To Book — Coming Soon</title>
  <link rel="canonical" href="https://whentobook.co.uk/under-construction.html">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a4a42'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='600' fill='%23f5f0e8'>W</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a4a42;
      color: #f5f0e8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.55);
      margin-bottom: 56px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 600;
      line-height: 1.1;
      text-align: center;
      color: #f5f0e8;
      max-width: 640px;
      margin-bottom: 24px;
    }

    .tagline {
      font-size: clamp(15px, 2.2vw, 17px);
      font-weight: 300;
      color: rgba(245, 240, 232, 0.65);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 64px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(245, 240, 232, 0.25);
      margin: 0 auto 48px;
    }

    .signup-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.5);
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      gap: 0;
      max-width: 380px;
      width: 100%;
    }

    input[type="email"] {
      flex: 1;
      padding: 14px 18px;
      background: rgba(245, 240, 232, 0.08);
      border: 1px solid rgba(245, 240, 232, 0.2);
      border-right: none;
      border-radius: 4px 0 0 4px;
      color: #f5f0e8;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]::placeholder {
      color: rgba(245, 240, 232, 0.35);
    }

    input[type="email"]:focus {
      border-color: rgba(245, 240, 232, 0.45);
    }

    button[type="submit"] {
      padding: 14px 22px;
      background: #f5f0e8;
      border: 1px solid #f5f0e8;
      border-radius: 0 4px 4px 0;
      color: #1a4a42;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }

    button[type="submit"]:hover {
      background: rgba(245, 240, 232, 0.88);
    }

    .success-msg {
      display: none;
      font-size: 14px;
      color: rgba(245, 240, 232, 0.7);
      text-align: center;
      padding: 14px 0;
      max-width: 380px;
    }

    footer {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(245, 240, 232, 0.25);
      letter-spacing: 0.06em;
    }

    @media (max-width: 480px) {
      form {
        flex-direction: column;
        gap: 10px;
      }

      input[type="email"] {
        border-right: 1px solid rgba(245, 240, 232, 0.2);
        border-radius: 4px;
      }

      button[type="submit"] {
        border-radius: 4px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <p class="wordmark">When To Book</p>

  <h1>We're sharpening our data.</h1>

  <p class="tagline">Back soon with something worth waiting for.</p>

  <div class="divider"></div>

  <p class="signup-label">Get notified when we launch</p>

  <form
    action="https://app.kit.com/forms/7f784a323c/subscriptions"
    method="post"
    id="signup-form"
  >
    <input
      type="email"
      name="email_address"
      placeholder="your@email.com"
      required
      autocomplete="email"
    >
    <button type="submit">Notify me</button>
  </form>

  <p class="success-msg" id="success-msg">You're on the list. We'll be in touch.</p>

  <footer>whentobook.co.uk</footer>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      var data = new FormData(form);
      fetch(form.action, { method: 'POST', body: data, mode: 'no-cors' })
        .finally(function() {
          form.style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';
        });
    });
  </script>

</body>
</html>
